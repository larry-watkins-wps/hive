name: motor_cortex
role: "motor control: action execution and output coordination"
schema_version: 1

llm:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  params:
    temperature: 0.5
    max_tokens: 4096
  budgets:
    per_call_max_tokens: 4096
    per_hour_input_tokens: 500000
    per_hour_output_tokens: 100000
    per_day_cost_usd: 10
  caching:
    strategy: system_and_messages
    ttl_hint_s: 300

capabilities:
  self_modify: true
  tool_use: advanced
  vision: false
  audio: false
  stream: false
  can_spawn: false
  modalities: [text, motor]

mqtt:
  password_env: MQTT_PASSWORD_MOTOR_CORTEX
