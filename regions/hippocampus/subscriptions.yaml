schema_version: 1
subscriptions:
  # Base subscriptions (all regions)
  - topic: hive/self/#
    qos: 1
    description: "Global identity state"
  - topic: hive/modulator/#
    qos: 0
    description: "Ambient modulator fields"
  - topic: hive/rhythm/#
    qos: 0
    description: "System rhythms"
  - topic: hive/broadcast/#
    qos: 1
    description: "System broadcasts (sleep, shutdown, etc.)"
  - topic: hive/attention/#
    qos: 0
    description: "Attention focus state"
  - topic: hive/interoception/#
    qos: 0
    description: "Internal body state"
  # Region-specific subscriptions
  - topic: hive/cognitive/hippocampus/query
    qos: 1
    description: "Memory query requests from other regions"
  - topic: hive/cognitive/hippocampus/encoding_hint
    qos: 1
    description: "Encoding hints (e.g. from amygdala for emotional tagging)"
  - topic: hive/sensory/#
    qos: 0
    description: "All sensory inputs for episodic encoding"
  - topic: hive/metacognition/reflection/response
    qos: 1
    description: "Reflection responses for episodic memory"
  - topic: hive/system/spawn/proposed
    qos: 1
    description: "Proposed spawn requests for episodic recording"
  - topic: hive/cognitive/hippocampus/#
    qos: 1
    description: "Directed requests to hippocampus"
