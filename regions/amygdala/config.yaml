name: amygdala
role: "threat salience: cortisol and norepinephrine modulation"
schema_version: 1

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  params:
    temperature: 0.7
    max_tokens: 4096
  budgets:
    per_call_max_tokens: 4096
    per_hour_input_tokens: 500000
    per_hour_output_tokens: 100000
    per_day_cost_usd: 10
  caching:
    strategy: system_and_messages
    ttl_hint_s: 300

capabilities:
  self_modify: false
  tool_use: basic
  vision: false
  audio: false
  stream: false
  can_spawn: false
  modalities: [text]

mqtt:
  password_env: MQTT_PASSWORD_AMYGDALA
