schema_version: 1
subscriptions:
  # Base subscriptions (all regions)
  - topic: hive/self/#
    qos: 1
    description: "Global identity state"
  - topic: hive/modulator/#
    qos: 0
    description: "Ambient modulator fields"
  - topic: hive/rhythm/#
    qos: 0
    description: "System rhythms"
  - topic: hive/broadcast/#
    qos: 1
    description: "System broadcasts (sleep, shutdown, etc.)"
  - topic: hive/attention/#
    qos: 0
    description: "Attention focus state"
  - topic: hive/interoception/#
    qos: 0
    description: "Internal body state"
  # Region-specific subscriptions
  - topic: hive/metacognition/#
    qos: 1
    description: "All metacognition signals (conflict, reflection)"
  - topic: hive/system/spawn/proposed
    qos: 1
    description: "Proposed spawn requests awaiting approval"
  - topic: hive/system/codechange/proposed
    qos: 1
    description: "Proposed code changes awaiting approval"
