schema_version: 1
subscriptions:
  # Base subscriptions (all regions)
  - topic: hive/self/#
    qos: 1
    description: "Global identity state"
  - topic: hive/modulator/#
    qos: 0
    description: "Ambient modulator fields"
  - topic: hive/rhythm/#
    qos: 0
    description: "System rhythms"
  - topic: hive/broadcast/#
    qos: 1
    description: "System broadcasts (sleep, shutdown, etc.)"
  - topic: hive/attention/#
    qos: 0
    description: "Attention focus state"
  - topic: hive/interoception/#
    qos: 0
    description: "Internal body state"
  # Region-specific subscriptions
  - topic: hive/motor/complete
    qos: 1
    description: "Motor completion signals for reward calculation"
  - topic: hive/motor/speech/complete
    qos: 1
    description: "Speech completion signals for reward calculation"
  - topic: hive/motor/failed
    qos: 1
    description: "Motor failure signals for negative reward"
