schema_version: 1
subscriptions:
  # Base subscriptions (all regions)
  - topic: hive/self/#
    qos: 1
    description: "Global identity state"
  - topic: hive/modulator/#
    qos: 0
    description: "Ambient modulator fields"
  - topic: hive/rhythm/#
    qos: 0
    description: "System rhythms"
  - topic: hive/broadcast/#
    qos: 1
    description: "System broadcasts (sleep, shutdown, etc.)"
  - topic: hive/attention/#
    qos: 0
    description: "Attention focus state"
  - topic: hive/interoception/#
    qos: 0
    description: "Internal body state"
  # Region-specific subscriptions
  - topic: hive/sensory/#
    qos: 0
    description: "All sensory inputs for cross-modal binding"
  - topic: hive/external/perception
    qos: 1
    description: "External perception — thought-form text from outside the organism (chat, future STT, future captioning). See observatory/docs/proposals/2026-04-29-association-cortex-perception-subscription.yaml."
  - topic: hive/cognitive/association_cortex/#
    qos: 1
    description: "Directed requests to association cortex"
