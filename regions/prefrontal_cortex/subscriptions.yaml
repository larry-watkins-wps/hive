schema_version: 1
subscriptions:
  # Base subscriptions (all regions)
  - topic: hive/self/#
    qos: 1
    description: "Global identity state"
  - topic: hive/modulator/#
    qos: 0
    description: "Ambient modulator fields"
  - topic: hive/rhythm/#
    qos: 0
    description: "System rhythms"
  - topic: hive/broadcast/#
    qos: 1
    description: "System broadcasts (sleep, shutdown, etc.)"
  - topic: hive/attention/#
    qos: 0
    description: "Attention focus state"
  - topic: hive/interoception/#
    qos: 0
    description: "Internal body state"
  # Region-specific subscriptions
  - topic: hive/cognitive/hippocampus/response
    qos: 1
    description: "Memory retrieval responses from hippocampus"
  - topic: hive/sensory/#
    qos: 0
    description: "All sensory inputs"
  - topic: hive/motor/complete
    qos: 1
    description: "Motor action completion signals"
  - topic: hive/motor/failed
    qos: 1
    description: "Motor action failure signals"
  - topic: hive/motor/partial
    qos: 1
    description: "Motor action partial completion signals"
  - topic: hive/motor/speech/complete
    qos: 1
    description: "Speech motor completion signals"
  - topic: hive/habit/suggestion
    qos: 0
    description: "Habit suggestions from basal ganglia"
  - topic: hive/cognitive/prefrontal_cortex/#
    qos: 1
    description: "Directed requests to prefrontal cortex"
