name: visual_cortex
role: "visual perception: feature extraction and scene recognition"
schema_version: 1

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  params:
    temperature: 0.7
    max_tokens: 4096
  budgets:
    per_call_max_tokens: 4096
    per_hour_input_tokens: 2000000
    per_hour_output_tokens: 300000
    per_day_cost_usd: 50
  caching:
    strategy: system_and_messages
    ttl_hint_s: 300

capabilities:
  self_modify: true
  tool_use: basic
  vision: true
  audio: false
  stream: false
  can_spawn: false
  modalities: [text, vision]

mqtt:
  password_env: MQTT_PASSWORD_VISUAL_CORTEX
