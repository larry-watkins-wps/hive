[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "PL"]
ignore = ["PLR0913"]  # too many arguments — runtime + adapters legitimately need many

[tool.mypy]
python_version = "3.11"
strict = true
exclude = ["tests/_tmp_", "regions/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "component: requires embedded broker (testcontainers)",
    "integration: requires docker compose stack",
    "llm_real: requires real LLM provider (gated)",
    "slow: test is slow (subprocess spin-up, etc.) — runs in default suite",
]
